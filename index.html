<!DOCTYPE html>
<html>
<head>
    <title>Medical Expert System</title>
    <link rel="stylesheet" href="mini.css">
</head>
<body>

<div class="container">
    <h1>🏥 Medical Expert System</h1>

    <p>Enter your symptoms (e.g. fever, cough):</p>

    <!-- FORM (Fix for Enter key) -->
    <form onsubmit="checkDisease(); return false;">
        <input type="text" id="symptomInput" placeholder="Type symptoms here" required>
        <br><br>
        <button type="submit">Check</button>
    </form>

    <div id="result"></div>
</div>

<script src="mini.js"></script>
</body>
</html>
